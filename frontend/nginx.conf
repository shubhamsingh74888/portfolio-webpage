server {
    listen 80;

    # 1. Serve the React files directly (Fastest & Best Practice)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Forward API calls to the backend container
    location /api/ {
        # Force Nginx to use Docker/Render's internal DNS resolver
        resolver 127.0.0.11 valid=30s;
        
        # Storing the URL in a variable prevents Nginx from crashing at boot time
        set $backend_upstream "http://portfolio-backend-h1an.onrender.com:10000";
        
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}